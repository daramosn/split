<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="description" content="Split expenses easily with friends, roommates, or travel buddies. No math, no arguments." />
		
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="SplitUp - Split expenses easily" />
		<meta property="og:description" content="Split expenses easily with friends, roommates, or travel buddies. No math, no arguments." />
		<meta property="og:site_name" content="SplitUp" />
		
		<!-- Twitter -->
		<meta property="twitter:card" content="summary" />
		<meta property="twitter:title" content="SplitUp - Split expenses easily" />
		<meta property="twitter:description" content="Split expenses easily with friends, roommates, or travel buddies. No math, no arguments." />
		
		<!-- Theme Color -->
		<meta name="theme-color" content="#006b5b" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#6fdbcf" media="(prefers-color-scheme: dark)" />
		
		<script>
			(function() {
				try {
					var saved = localStorage.getItem('theme');
					var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
				} catch (e) {}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
